<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mi Huella{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F5F5F4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #F5F5F4;">
    <tr>
      <td align="center" style="padding: 40px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">

          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #14B8A6, #0D9488); border-radius: 16px 16px 0 0; padding: 32px 40px; text-align: center;">
              <h1 style="margin: 0; font-size: 28px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.5px;">
                Mi Huella
              </h1>
              <p style="margin: 8px 0 0; font-size: 14px; color: rgba(255,255,255,0.85);">
                {% block header_subtitle %}Plataforma de adopcion y apadrinamiento animal{% endblock %}
              </p>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="background-color: #FFFFFF; padding: 40px; border-left: 1px solid #E7E5E4; border-right: 1px solid #E7E5E4;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #FAFAF9; border-radius: 0 0 16px 16px; padding: 24px 40px; text-align: center; border: 1px solid #E7E5E4; border-top: none;">
              <p style="margin: 0; font-size: 12px; color: #A8A29E; line-height: 1.6;">
                Este correo fue enviado automaticamente por Mi Huella.<br>
                Por favor no respondas a este correo.
              </p>
              <p style="margin: 12px 0 0; font-size: 11px; color: #D6D3D1;">
                &copy; {% now "Y" %} Mi Huella. Todos los derechos reservados.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
